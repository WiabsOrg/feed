name: Update Feed

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and encode feed
        run: python scripts/update_feed.py
        env:
          FEED_ENCRYPTION_KEY: ${{ secrets.FEED_ENCRYPTION_KEY }}

      - name: Commit feed.bin
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'update feed'
          file_pattern: feed.bin
          commit_user_name: wiabs-bot
          commit_user_email: bot@wiabs.app
          commit_author: 'wiabs-bot <bot@wiabs.app>'
